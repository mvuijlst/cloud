<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gatekeeper</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background-color: #f0ea21; font-family: sans-serif; }
        body { display: flex; flex-direction: column; align-items: center; }
        canvas { display: block; }
        #controls { margin: 10px; z-index: 10; padding: 8px; background: transparent; border-radius: 8px; }
        input { font-size: 16px; padding: 5px; }
        button { font-size: 16px; padding: 5px 10px; cursor: pointer; }
        #attribution { position: fixed; bottom: 8px; left: 10px; font-size: 10px; z-index: 10; }
        #attribution a { text-decoration: underline; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="sketch.js"></script>
</head>
<body>
    <div id="controls">
        <input type="text" id="wordInput" value="GATEKEEPER" placeholder="Enter a word">
        <button id="animBtn">Go</button>
    </div>
    <div id="attribution">Based on an idea by <a href="https://www.nytimes.com/2026/04/09/magazine/gatekeeping-language-filtering-information.html">Antonin Waterkeyn</a></div>
</body>
</html>
