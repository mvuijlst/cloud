<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gatekeeper</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #f0ea21; font-family: sans-serif; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }
        #controls { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 10; padding: 8px; background: transparent; border-radius: 8px; transition: opacity 0.3s ease; display: flex; gap: 4px; align-items: center; white-space: nowrap; }
        #controls.hidden { opacity: 0; pointer-events: none; }
        input { font-size: 16px; padding: 5px; }
        button { font-size: 16px; padding: 5px 10px; cursor: pointer; }
        #toggleBtn { position: fixed; top: 8px; right: 8px; z-index: 20; font-size: 20px; background: rgba(255,255,255,0.5); border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; line-height: 32px; padding: 0; text-align: center; }
        #attribution { position: fixed; bottom: 8px; left: 10px; font-size: 10px; z-index: 10; }
        #attribution a { text-decoration: underline; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="sketch.js"></script>
</head>
<body>
    <button id="toggleBtn" title="Toggle controls">⚙</button>
    <form id="controls" class="hidden" autocomplete="off">
        <input type="text" id="wordInput" value="GATEKEEPER" placeholder="Enter a word">
        <button type="submit" id="animBtn">Go</button>
    </form>
    <div id="attribution">Based on an idea by <a href="https://www.nytimes.com/2026/04/09/magazine/gatekeeping-language-filtering-information.html">Antonin Waterkeyn</a></div>
</body>
</html>
